<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Mapa de Clientes — Comercial</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');
:root{
  --sans:'Space Grotesk',system-ui,-apple-system,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,'SF Mono',Menlo,monospace;
}
/* THEME: light (default) */
body.theme-light{
  --pageBgTop:#f6f9fc; --pageBgBot:#eaf1f8;
  --text:#1f2a37; --muted:#5d6b7d; --muted2:#93a2b4;
  --card:rgba(255,255,255,.78); --cardBorder:rgba(40,70,110,.15);
  --segBg:rgba(255,255,255,.72); --segOnBg:rgba(47,111,214,.12); --segOnText:#1f5fc0;
  --tabActive:#2563eb;
  --mapBg:#e8f0fb; --fillT:.11; --lineA:.42; --edgeA:.30; --stageGlowA:.06; --rlabelA:.42;
  --cliB:#15803d; --ledB:#0284c7;
  --panelBg:rgba(255,255,255,.97); --panelBorder:rgba(40,90,160,.2); --panelHead:rgba(47,111,214,.06);
  --tipBg:rgba(255,255,255,.97); --tipBorder:rgba(40,90,160,.25); --tipName:#1f5fc0;
  --bdgBorder:rgba(40,90,160,.28); --bdgText:#1f5fc0; --bdgBg:rgba(47,111,214,.07);
  --vig:rgba(40,70,110,.08);
}
/* THEME: dark */
body.theme-dark{
  --pageBgTop:#0a0f16; --pageBgBot:#070b11;
  --text:#e6edf5; --muted:#8395ab; --muted2:#566377;
  --card:rgba(10,15,22,.55); --cardBorder:rgba(120,165,205,.16);
  --segBg:rgba(8,13,20,.7); --segOnBg:rgba(120,180,235,.16); --segOnText:#cfe6ff;
  --tabActive:#7fc0ff;
  --mapBg:#080e1a; --fillT:.10; --lineA:.40; --edgeA:.5; --stageGlowA:.10; --rlabelA:.36;
  --cliB:#34e27d; --ledB:#7cd4ff;
  --panelBg:rgba(9,14,21,.93); --panelBorder:rgba(120,180,235,.3); --panelHead:rgba(70,130,200,.07);
  --tipBg:rgba(8,13,20,.94); --tipBorder:rgba(120,180,235,.32); --tipName:#cfe6ff;
  --bdgBorder:rgba(120,180,235,.34); --bdgText:#bfe0ff; --bdgBg:rgba(70,130,200,.07);
  --vig:rgba(0,0,0,.5);
}
/* SKIN accent (rgb) */
.stage.skin-blue{--acc:47,111,214}
.stage.skin-holo{--acc:22,184,160}
.stage.skin-relevo{--acc:132,184,40}

*{box-sizing:border-box}
html,body{margin:0;min-height:100%}
body{background:linear-gradient(180deg,var(--pageBgTop),var(--pageBgBot));color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;transition:background .25s,color .25s}
.wrap{max-width:1180px;margin:0 auto;padding:20px 20px 44px}

.eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.24em;color:var(--muted2);text-transform:uppercase;margin-bottom:8px}
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--cardBorder);margin-bottom:18px}
.tab{font-family:var(--mono);font-size:12px;letter-spacing:.04em;color:var(--muted);padding:11px 16px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:.14s}
.tab:hover{color:var(--text)}
.tab.on{color:var(--tabActive);border-bottom-color:var(--tabActive)}

.toolbar{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:12px}
.tl-l{display:flex;align-items:center;gap:12px}
.tl-l .ttl{font-size:19px;font-weight:700;letter-spacing:-.01em;display:flex;align-items:center;gap:10px}
.tl-l .ttl .dot{width:8px;height:8px;border-radius:50%;background:var(--cliB);box-shadow:0 0 9px color-mix(in srgb,var(--cliB) 70%,transparent)}
.seg{display:flex;background:var(--segBg);border:1px solid var(--cardBorder);border-radius:9px;overflow:hidden}
.seg button{font-family:var(--mono);font-size:11px;letter-spacing:.03em;color:var(--muted);background:transparent;border:0;padding:8px 13px;cursor:pointer;transition:.14s}
.seg button:hover{color:var(--text)}
.seg button.on{background:var(--segOnBg);color:var(--segOnText)}
.seg button+button{border-left:1px solid var(--cardBorder)}
.stats{display:flex;gap:8px;align-items:center}
.stat{font-family:var(--mono);font-size:11px;color:var(--text);border:1px solid var(--cardBorder);background:var(--card);padding:6px 11px;border-radius:8px;display:flex;gap:7px;align-items:baseline}
.stat b{font-size:15px;font-weight:700}
.stat.g b{color:var(--cliB)} .stat.s b{color:var(--ledB)}
.stat .l{color:var(--muted);text-transform:uppercase;letter-spacing:.12em;font-size:9px}

.stage{position:relative;border-radius:16px;overflow:hidden;border:1px solid var(--cardBorder);
  background:radial-gradient(640px 360px at 50% 64%,rgba(var(--acc),var(--stageGlowA)),transparent 62%),var(--mapBg);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.04),inset 0 0 70px rgba(0,0,0,.06);padding:14px;transition:background .25s}
body.theme-dark .stage{box-shadow:inset 0 1px 0 rgba(150,190,230,.06),inset 0 0 90px rgba(0,0,0,.5)}
svg.map{display:block;width:100%;height:auto}
.fill{fill:rgba(var(--acc),var(--fillT))}
.skin-relevo .region{filter:drop-shadow(0 6px 9px rgba(0,0,0,.18))}
body.theme-dark .skin-relevo .region{filter:drop-shadow(0 7px 11px rgba(0,0,0,.5))}
.lines{fill:none;stroke:rgba(var(--acc),var(--lineA));stroke-width:.65;stroke-linejoin:round;vector-effect:non-scaling-stroke}
.edgeGlow{fill:none;stroke:rgba(var(--acc),var(--edgeA));stroke-width:4.5;stroke-linejoin:round;filter:url(#glow);opacity:0;transition:opacity .2s}
.edge{fill:none;stroke:rgba(var(--acc),.9);stroke-width:1.05;stroke-linejoin:round;vector-effect:non-scaling-stroke;filter:url(#glow)}
body.theme-dark .edge{stroke:rgba(225,242,255,.85)}
.fillHit{fill:#000;opacity:0;cursor:default}
.region.hot .edgeGlow{opacity:.7}
.rlabel{fill:rgba(var(--acc),var(--rlabelA));font-family:var(--mono);font-size:15px;letter-spacing:5px;text-anchor:middle;pointer-events:none;text-transform:uppercase}
.scan{position:absolute;inset:0;pointer-events:none;display:none;mix-blend-mode:screen;opacity:.4;background:repeating-linear-gradient(0deg,rgba(124,247,218,.05) 0 1px,transparent 1px 4px)}
body.theme-dark .stage.skin-holo .scan{display:block}

.pin{cursor:pointer}
.pin .halo{opacity:.9}
.pin.client .halo{fill:rgba(34,197,94,.16)}
.pin.lead .halo{fill:rgba(56,189,248,.16)}
.pin.client .core{fill:url(#g-cli-l)} .pin.lead .core{fill:url(#g-led-l)}
body.theme-dark .pin.client .core{fill:url(#g-cli-d)} body.theme-dark .pin.lead .core{fill:url(#g-led-d)}
.pin .core{filter:url(#pgL)}
body.theme-dark .pin .core{filter:url(#pgB)}
.pin .hit{fill:transparent}
.pin:hover .halo{opacity:1}
.pin.sel .selRing{fill:none;stroke:rgba(var(--acc),.95);stroke-width:1.2;opacity:.95}
body.theme-dark .pin.sel .selRing{stroke:#fff}
.selRing{opacity:0}

.vig{position:absolute;inset:0;pointer-events:none;box-shadow:inset 0 0 140px var(--vig)}
.cap{font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;color:var(--muted2);margin-top:10px;text-align:center}

.settings{margin-top:22px;border:1px solid var(--cardBorder);border-radius:14px;background:var(--card);padding:16px 18px}
.settings .sh{font-family:var(--mono);font-size:10px;letter-spacing:.16em;color:var(--muted2);text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.settings .sh .pin-ico{width:6px;height:6px;border-radius:50%;background:var(--ledB)}
.row{display:flex;align-items:center;gap:14px;padding:9px 0}
.row+.row{border-top:1px dashed var(--cardBorder)}
.row .rl{font-size:13px;color:var(--text);min-width:160px}
.row .rl small{display:block;font-family:var(--mono);font-size:10px;color:var(--muted2);letter-spacing:.04em;margin-top:2px}

.tip{position:fixed;z-index:60;font-family:var(--mono);font-size:11px;color:var(--text);background:var(--tipBg);border:1px solid var(--tipBorder);padding:6px 9px;border-radius:7px;pointer-events:none;opacity:0;transition:opacity .12s;white-space:nowrap;box-shadow:0 6px 20px rgba(0,0,0,.1)}
.tip.show{opacity:1}
.tip b{color:var(--tipName)}
.panel{position:fixed;z-index:65;width:268px;max-width:calc(100vw - 24px);background:var(--panelBg);backdrop-filter:blur(10px);border:1px solid var(--panelBorder);border-radius:13px;box-shadow:0 16px 54px rgba(0,0,0,.22);opacity:0;transform:translateY(6px) scale(.98);pointer-events:none;transition:.16s;overflow:hidden}
.panel.open{opacity:1;transform:none;pointer-events:auto}
.ph{padding:13px 14px 11px;border-bottom:1px solid var(--cardBorder);background:linear-gradient(180deg,var(--panelHead),transparent)}
.ph .city{font-size:17px;font-weight:700;letter-spacing:-.01em;display:flex;align-items:center;gap:8px}
.ph .city .st{font-family:var(--mono);font-size:11px;color:var(--muted);font-weight:500}
.badges{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap}
.bdg{font-family:var(--mono);font-size:10px;letter-spacing:.05em;padding:4px 8px;border-radius:7px;border:1px solid var(--bdgBorder);color:var(--bdgText);background:var(--bdgBg)}
.pb{padding:10px 14px 14px}
.sec+.sec{margin-top:12px;padding-top:11px;border-top:1px dashed var(--cardBorder)}
.cap2{font-family:var(--mono);font-size:9px;letter-spacing:.16em;text-transform:uppercase;margin-bottom:9px;display:flex;align-items:center;gap:7px}
.cap2::before{content:"";width:7px;height:7px;border-radius:50%}
.cap2.client{color:var(--cliB)} .cap2.client::before{background:#22c55e;box-shadow:0 0 7px rgba(34,197,94,.7)}
.cap2.lead{color:var(--ledB)} .cap2.lead::before{background:#38bdf8;box-shadow:0 0 7px rgba(56,189,248,.7)}
.cli{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px dashed var(--cardBorder)}
.cli:last-child{border-bottom:none}
.cli .ix{font-family:var(--mono);font-size:10px;color:var(--muted2);width:15px}
.cli .tk{width:6px;height:6px;border-radius:50%;flex:none}
.cli .tk.client{background:#22c55e;box-shadow:0 0 7px rgba(34,197,94,.7)}
.cli .tk.lead{background:#38bdf8;box-shadow:0 0 7px rgba(56,189,248,.7)}
.cli .nm{font-family:var(--mono);font-size:12.5px;color:var(--text)}
.x{position:absolute;top:10px;right:11px;width:22px;height:22px;border-radius:6px;cursor:pointer;display:grid;place-items:center;color:var(--muted);border:1px solid transparent;font-size:14px}
.x:hover{color:var(--tipName);border-color:var(--bdgBorder)}

@media (max-width:700px){
  .toolbar{align-items:flex-start}
  .row{flex-direction:column;align-items:flex-start;gap:8px}
  .panel{left:8px!important;right:8px!important;top:auto!important;bottom:10px!important;width:auto}
  .rlabel{font-size:12px;letter-spacing:3px}
}
</style>
</head>
<body class="theme-light">
<div class="wrap">
  <div class="eyebrow">DR Growth · Comercial</div>
  <div class="tabs">
    <div class="tab">Funil</div><div class="tab">Contatos</div><div class="tab">Vendedores</div><div class="tab on">Mapa</div>
  </div>

  <div class="toolbar">
    <div class="tl-l">
      <div class="ttl"><span class="dot"></span>Mapa de Clientes</div>
      <div class="seg" id="filterSeg">
        <button data-f="todos" class="on">Todos</button>
        <button data-f="clientes">Clientes</button>
        <button data-f="leads">Leads</button>
      </div>
    </div>
    <div class="stats" id="stats"></div>
  </div>

  <div class="stage skin-blue" id="stage">
    <div class="holo"><svg class="map" id="svg" xmlns="http://www.w3.org/2000/svg"></svg></div>
    <div class="scan"></div>
    <div class="vig"></div>
  </div>
  <div class="cap">Clique num ponto para ver clientes e leads · passe o mouse para o resumo</div>

  <div class="settings">
    <div class="sh"><span class="pin-ico"></span>Configurações · Comercial · Mapa</div>
    <div class="row"><div class="rl">Tema<small>Claro ou escuro</small></div>
      <div class="seg" id="themeSeg"><button data-t="light" class="on">Claro</button><button data-t="dark">Escuro</button></div></div>
    <div class="row"><div class="rl">Estilo do mapa<small>Aparência do terreno</small></div>
      <div class="seg" id="skinSeg"><button data-s="blue" class="on">Blueprint</button><button data-s="holo">Holograma</button><button data-s="relevo">Relevo</button></div></div>
    <div class="row"><div class="rl">Separação das placas<small>Espaço entre as 3 regiões</small></div>
      <div class="seg" id="sepSeg"><button data-v="4" class="on">Justo</button><button data-v="16">Espaçoso</button></div></div>
  </div>
</div>

<div class="tip" id="tip"></div>
<div class="panel" id="panel">
  <div class="x" id="px">&#215;</div>
  <div class="ph"><div class="city"><span id="pCity"></span><span class="st" id="pSt"></span></div>
    <div class="badges"><span class="bdg" id="pCode"></span><span class="bdg" id="pTz"></span></div></div>
  <div class="pb" id="pBody"></div>
</div>

const W=DATA.W,H=DATA.H;
let SEP=4, FILTER='todos';
const DIR={W:[-1,0],C:[0,0],E:[1,0]};
const svg=document.getElementById('svg');
const NS='http://www.w3.org/2000/svg';
svg.setAttribute('viewBox','0 0 '+W+' '+H);
function El(n,a){const e=document.createElementNS(NS,n);for(const k in a)e.setAttribute(k,a[k]);return e;}
function esc(s){return String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}

const defs=El('defs',{});
defs.innerHTML=`
 <radialGradient id="g-cli-l" cx="38%" cy="34%" r="72%"><stop offset="0" stop-color="#62d18d"/><stop offset=".5" stop-color="#15a34a"/><stop offset="1" stop-color="#0b6e33"/></radialGradient>
 <radialGradient id="g-led-l" cx="38%" cy="34%" r="72%"><stop offset="0" stop-color="#6cc6f2"/><stop offset=".5" stop-color="#0ea5e9"/><stop offset="1" stop-color="#0a78b8"/></radialGradient>
 <radialGradient id="g-cli-d" cx="38%" cy="34%" r="72%"><stop offset="0" stop-color="#ffffff"/><stop offset=".45" stop-color="#34e27d"/><stop offset="1" stop-color="#13a651"/></radialGradient>
 <radialGradient id="g-led-d" cx="38%" cy="34%" r="72%"><stop offset="0" stop-color="#ffffff"/><stop offset=".45" stop-color="#73d2ff"/><stop offset="1" stop-color="#1f9ee6"/></radialGradient>
 <filter id="glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="1.4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
 <filter id="pgL" x="-200%" y="-200%" width="500%" height="500%"><feGaussianBlur stdDeviation="1.1" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
 <filter id="pgB" x="-400%" y="-400%" width="900%" height="900%"><feGaussianBlur stdDeviation="2.6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>`;
svg.appendChild(defs);

const regionEls={};
DATA.regions.forEach(r=>{
  const g=El('g',{class:'region','data-k':r.key});
  g.appendChild(El('path',{class:'fill',d:r.fill}));
  g.appendChild(El('path',{class:'fillHit',d:r.fill}));
  g.appendChild(El('path',{class:'lines',d:r.lines}));
  g.appendChild(El('path',{class:'edgeGlow',d:r.fill}));
  g.appendChild(El('path',{class:'edge',d:r.fill}));
  const t=El('text',{class:'rlabel',x:r.lx,y:r.ly});t.textContent=r.name;g.appendChild(t);
  svg.appendChild(g);regionEls[r.key]=g;
  const fh=g.querySelector('.fillHit');
  fh.addEventListener('mouseenter',()=>g.classList.add('hot'));
  fh.addEventListener('mouseleave',()=>g.classList.remove('hot'));
});
const pinLayer=El('g',{});svg.appendChild(pinLayer);

const stats=document.getElementById('stats'),tip=document.getElementById('tip'),panel=document.getElementById('panel');
let selEl=null;
function applySep(){DATA.regions.forEach(r=>{const d=DIR[r.key];regionEls[r.key].setAttribute('transform','translate('+(d[0]*SEP)+','+(d[1]*SEP)+')');});renderPins();}
function moveTip(el){const r=el.getBoundingClientRect();tip.style.left=(r.left+r.width/2)+'px';tip.style.top=(r.top-34)+'px';tip.style.transform='translateX(-50%)';}
function addPin(c,type,x,y,n){
  const g=El('g',{class:'pin '+type,tabindex:'0',role:'button','aria-label':c.city});
  g.setAttribute('transform','translate('+x+','+y+')');
  g.appendChild(El('circle',{class:'halo',r:11}));
  g.appendChild(El('circle',{class:'selRing',r:8}));
  g.appendChild(El('circle',{class:'core',r:3.4+Math.min(n-1,2)*0.6}));
  g.appendChild(El('circle',{class:'hit',r:14}));
  g.addEventListener('mouseenter',()=>{const lbl=type==='client'?('cliente'+(n>1?'s':'')):('lead'+(n>1?'s':''));tip.innerHTML='<b>'+esc(c.city)+'</b> · '+n+' '+lbl;moveTip(g);tip.classList.add('show');});
  g.addEventListener('mouseleave',()=>tip.classList.remove('show'));
  g.addEventListener('click',e=>{e.stopPropagation();tip.classList.remove('show');openPanel(c,g);});
  g.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();openPanel(c,g);}});
  pinLayer.appendChild(g);
}
function renderPins(){
  pinLayer.innerHTML='';
  DATA.cities.forEach(c=>{
    const bx=c.x+DIR[c.region][0]*SEP, by=c.y;
    const hasC=c.clients.length>0, hasL=c.leads.length>0;
    if(FILTER!=='leads'&&hasC) addPin(c,'client',(FILTER==='todos'&&hasL)?bx-4:bx,by,c.clients.length);
    if(FILTER!=='clientes'&&hasL) addPin(c,'lead',(FILTER==='todos'&&hasC)?bx+4:bx,by,c.leads.length);
  });
}
function section(title,arr,cls){
  return '<div class="sec"><div class="cap2 '+cls+'">'+title+' · '+arr.length+'</div>'+
    arr.map((n,k)=>'<div class="cli"><span class="ix">'+String(k+1).padStart(2,'0')+'</span><span class="tk '+cls+'"></span><span class="nm">'+esc(n)+'</span></div>').join('')+'</div>';
}
function openPanel(c,el){
  document.getElementById('pCity').textContent=c.city;
  document.getElementById('pSt').textContent=c.st;
  document.getElementById('pCode').textContent='DDD '+c.code;
  document.getElementById('pTz').textContent=c.tz;
  let h='';
  if(c.clients.length)h+=section('Clientes',c.clients,'client');
  if(c.leads.length)h+=section('Leads',c.leads,'lead');
  document.getElementById('pBody').innerHTML=h;
  panel.classList.add('open');
  const r=el.getBoundingClientRect();
  if(innerWidth>700){let left=r.right+14,top=r.top-12;const pw=268,ph=panel.offsetHeight||240;
    if(left+pw>innerWidth-12)left=r.left-pw-14; if(left<12)left=12;
    if(top+ph>innerHeight-12)top=innerHeight-ph-12; if(top<12)top=12;
    panel.style.left=left+'px';panel.style.top=top+'px';}
  if(selEl)selEl.classList.remove('sel'); el.classList.add('sel'); selEl=el;
}
function closePanel(){panel.classList.remove('open');if(selEl){selEl.classList.remove('sel');selEl=null;}}
document.getElementById('px').addEventListener('click',closePanel);
document.addEventListener('click',e=>{if(!panel.contains(e.target)&&!e.target.closest('.pin'))closePanel();});
addEventListener('keydown',e=>{if(e.key==='Escape')closePanel();});
addEventListener('scroll',()=>{if(panel.classList.contains('open'))closePanel();},true);

(function(){
  const totC=DATA.cities.reduce((a,c)=>a+c.clients.length,0);
  const totL=DATA.cities.reduce((a,c)=>a+c.leads.length,0);
  stats.innerHTML=[['Cidades',DATA.cities.length,''],['Clientes',totC,'g'],['Leads',totL,'s']]
    .map(c=>'<div class="stat '+c[2]+'"><b>'+c[1]+'</b><span class="l">'+c[0]+'</span></div>').join('');
})();

const stage=document.getElementById('stage');
function segPick(seg,cb){seg.addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;[...seg.children].forEach(x=>x.classList.remove('on'));b.classList.add('on');cb(b);});}
segPick(document.getElementById('filterSeg'),b=>{FILTER=b.dataset.f;closePanel();renderPins();});
segPick(document.getElementById('skinSeg'),b=>{stage.classList.remove('skin-blue','skin-holo','skin-relevo');stage.classList.add('skin-'+b.dataset.s);});
segPick(document.getElementById('sepSeg'),b=>{SEP=+b.dataset.v;closePanel();applySep();});
segPick(document.getElementById('themeSeg'),b=>{document.body.classList.remove('theme-light','theme-dark');document.body.classList.add('theme-'+b.dataset.t);closePanel();});

applySep();
</script>
