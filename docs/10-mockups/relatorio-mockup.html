<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Relatório — Movimentação do Funil</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');
:root{--sans:'Geist',system-ui,-apple-system,sans-serif;--disp:'Space Grotesk',var(--sans);--mono:'JetBrains Mono',ui-monospace,Menlo,monospace}
body.dark{--bg:#080d0a;--panel:#0e1511;--border:rgba(150,190,160,.12);--text:#f3f7ef;--muted:#8fa399;--muted2:#5c6e63;--chip:#121a15;--accent:#c2f73a;--accentT:#0a0f0c;--badge:rgba(243,247,239,.06);--rail:rgba(243,247,239,.08)}
body.light{--bg:#f2f5f2;--panel:#ffffff;--border:rgba(20,40,30,.11);--text:#18221c;--muted:#5d6b62;--muted2:#9aa79f;--chip:#eaefea;--accent:#c2f73a;--accentT:#0a0f0c;--badge:rgba(20,40,30,.05);--rail:rgba(20,40,30,.06)}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased}
.wrap{max-width:1080px;margin:0 auto;padding:22px 20px 50px}
.head{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;margin-bottom:6px}
.eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.22em;color:var(--muted2);text-transform:uppercase}
h1{font-family:var(--disp);font-size:22px;font-weight:700;letter-spacing:-.01em;margin:6px 0 0}
.h-r{display:flex;gap:8px;align-items:center}
.btn{font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;color:var(--muted);background:var(--chip);border:1px solid var(--border);border-radius:8px;padding:8px 12px;cursor:pointer;text-transform:uppercase}
.btn:hover{color:var(--text)}
.previa{position:relative}
.previa::after{content:"prévia";position:absolute;top:-7px;right:-6px;font-family:var(--mono);font-size:7px;letter-spacing:.1em;background:var(--accent);color:var(--accentT);border-radius:5px;padding:1px 4px;text-transform:uppercase}
.controls{display:flex;justify-content:flex-start;align-items:center;gap:12px;flex-wrap:wrap;margin:16px 0 18px}
.period{display:flex;gap:4px;background:var(--panel);border:1px solid var(--border);border-radius:11px;padding:4px}
.period button{font-family:var(--mono);font-size:12px;color:var(--muted);background:transparent;border:0;padding:8px 15px;border-radius:8px;cursor:pointer;transition:.14s}
.period button:hover{color:var(--text)}
.period button.on{background:var(--accent);color:var(--accentT);font-weight:600}
.range{font-family:var(--mono);font-size:12px;color:var(--muted);display:flex;align-items:center;gap:10px}
.range .seller{color:var(--text);border:1px solid var(--border);background:var(--panel);padding:6px 10px;border-radius:8px}

.block-t{font-family:var(--mono);font-size:10px;letter-spacing:.18em;color:var(--muted2);text-transform:uppercase;margin:0 2px 10px}
.kgrid{display:flex;flex-wrap:wrap;gap:9px}
.kgrid.k2{margin-top:9px}
.kpi{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px 15px;flex:1 1 120px}
.kpi .v{font-family:var(--disp);font-size:29px;font-weight:700;letter-spacing:-.02em;line-height:1;color:var(--text)}
.kpi .l{font-family:var(--mono);font-size:10px;letter-spacing:.05em;color:var(--muted);text-transform:uppercase;margin-top:8px}
.kpi .s{font-family:var(--mono);font-size:10px;color:var(--muted2);margin-top:4px}
.kpi.small .v{font-size:23px}

.grid{columns:2;column-gap:10px}
.sec{background:var(--panel);border:1px solid var(--border);border-radius:13px;padding:13px 15px;break-inside:avoid;-webkit-column-break-inside:avoid;margin-bottom:10px}
.sec h3{font-family:var(--disp);font-size:14px;font-weight:600;margin:0;display:flex;align-items:center;justify-content:space-between;gap:8px;cursor:pointer;user-select:none}
.sec h3 .c{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--muted);background:var(--badge);border-radius:20px;padding:2px 9px;min-width:26px;text-align:center}.sec .hr{display:flex;align-items:center;gap:8px}.sec .tg{font-size:11px;color:var(--muted2);transition:transform .15s;display:inline-block}.sec.closed .tg{transform:rotate(-90deg)}.sec.closed .rows{display:none}
.rows{margin-top:10px;display:flex;flex-direction:column}
.r{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:6.5px 0;border-bottom:1px solid var(--rail)}
.r:last-child{border-bottom:none}
.r .who{display:flex;flex-direction:column;gap:1px;min-width:0}
.r .nm{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.r .co{font-family:var(--mono);font-size:10px;color:var(--muted2)}
.r .meta{font-family:var(--mono);font-size:10.5px;color:var(--muted);white-space:nowrap;text-align:right}
.more{font-family:var(--mono);font-size:10.5px;color:var(--muted2);padding-top:9px;letter-spacing:.04em}
.empty{font-family:var(--mono);font-size:11px;color:var(--muted2);padding:6px 0}
.foot{font-family:var(--mono);font-size:10.5px;color:var(--muted2);margin-top:18px;text-align:center;letter-spacing:.04em}
@media (max-width:760px){.grid{columns:1}}
</style>
</head>
<body class="dark">
<div class="wrap">
  <div class="head">
    <div><div class="eyebrow">DR Growth · Comercial</div><h1>Relatório — Movimentação do Funil</h1></div>
    <div class="h-r"><button class="btn previa" id="theme">Escuro</button><button class="btn" id="pdf">Gerar PDF</button></div>
  </div>

  <div class="controls">
    <div class="period" id="period">
      <button data-p="semana" class="on">Semana</button>
      <button data-p="mes">Mês</button>
      <button data-p="semestre">Semestre</button>
      <button data-p="ano">Ano</button>
    </div>
    <div class="range"><span id="rangeLbl"></span><span class="seller">Vendedor: Lucas</span></div>
  </div>

  <div class="block-t">Conversão no período</div>
  <div class="kgrid" id="kpis"></div>
  <div class="kgrid k2" id="kpis2"></div>

  <div class="block-t" style="margin-top:24px">Detalhe por evento</div>
  <div class="grid" id="grid"></div>
  <div class="foot">Leads de teste e da Lixeira não entram no relatório.</div>
</div>

<script>
const SECTIONS=[
  {key:'entrou', t:'Entraram (Novos)'},{key:'interagiu', t:'Interagiram'},{key:'naoint', t:'Não interagiram'},
  {key:'reuniao', t:'Reunião marcada'},{key:'noshow', t:'No-show'},{key:'reag', t:'Reagendamento'},
  {key:'proposta', t:'Proposta em análise'},{key:'futuro', t:'Negócio futuro'},
  {key:'fechou', t:'Fechou (Venda Concluída)'},{key:'perdido', t:'Não fechou (Venda Perdida)'},
];
const L=(nm,co,d)=>({nm,co,d});
const SEMANA={range:'Semana de 16–22 jun 2026', data:{
  entrou:[L('Iara Portilho','Color Trends','16/jun'),L('Katia Lima','—','19/jun'),L('Sirlene Oliveira','—','19/jun'),L('Ricardo','—','19/jun'),L('Diego Souza','—','16/jun'),L('Joaquim','—','15/jun'),L('Thais Lima','—','14/jun'),L('Maycon Ferreira','—','14/jun')],
  interagiu:[L('Iara Portilho','Color Trends','16/jun'),L('Emerson Fuentes','Fuentes Co','16/jun'),L('Matheus Silva','Silva Imports','19/jun'),L('Joaquim','—','17/jun'),L('Thais Lima','—','18/jun'),L('Maycon Ferreira','—','18/jun')],
  naoint:[L('marcia dias','—','22/jun'),L('Katia Lima','—','20/jun')],
  reuniao:[L('Iara Portilho','Color Trends','22/jun'),L('Emerson Fuentes','Fuentes Co','17/jun'),L('Joaquim','—','18/jun'),L('Thais Lima','—','19/jun')],
  noshow:[L('Sirlene Oliveira','—','22/jun')],
  reag:[L('Maycon Ferreira','—','20/jun')],
  proposta:[L('Emerson Fuentes','Fuentes Co','19/jun'),L('Joaquim','—','21/jun')],
  futuro:[L('Thais Lima','—','21/jun')],
  fechou:[L('Matheus Silva','Silva Imports','20/jun'),L('Emerson Fuentes','Fuentes Co','22/jun')],
  perdido:[L('Diego Souza','—','21/jun')],
}};
function scale(range,mult){const data={};for(const s of SECTIONS){const base=SEMANA.data[s.key];data[s.key]={items:base,total:Math.max(base.length,Math.round(base.length*mult))};}return {range,data};}
const PERIODS={semana:SEMANA, mes:scale('Junho 2026',3.6), semestre:scale('Jan–Jun 2026',19), ano:scale('Ano de 2026',34)};
const totalOf=(P,k)=>{const r=P.data[k];return Array.isArray(r)?r.length:r.total;};

function render(pKey){
  const P=PERIODS[pKey];
  document.getElementById('rangeLbl').textContent=P.range;
  const T={};SECTIONS.forEach(s=>T[s.key]=totalOf(P,s.key));
  const pc=(a,b)=>b?Math.round(a/b*100)+'%':'—';
  const prim=[
    {l:'Entraram',v:T.entrou,s:'novos no período'},
    {l:'Interagiram',v:T.interagiu,s:pc(T.interagiu,T.entrou)+' dos leads'},
    {l:'Reunião marcada',v:T.reuniao,s:pc(T.reuniao,T.entrou)+' dos leads'},
    {l:'Proposta',v:T.proposta,s:pc(T.proposta,T.entrou)+' dos leads'},
    {l:'Fechou',v:T.fechou,s:pc(T.fechou,T.entrou)+' dos leads'},
  ];
  const sec=[
    {l:'No-show',v:T.noshow,s:pc(T.noshow,T.reuniao)+' das reuniões'},
    {l:'Reagendamento',v:T.reag,s:'remarcadas'},
    {l:'Negócio futuro',v:T.futuro,s:'retomar depois'},
    {l:'Não fechou',v:T.perdido,s:'venda perdida'},
  ];
  const box=(k,small)=>'<div class="kpi'+(small?' small':'')+'"><div class="v">'+k.v+'</div><div class="l">'+k.l+'</div>'+(k.s?'<div class="s">'+k.s+'</div>':'')+'</div>';
  document.getElementById('kpis').innerHTML=prim.map(k=>box(k,false)).join('');
  document.getElementById('kpis2').innerHTML=sec.map(k=>box(k,true)).join('');
  const grid=document.getElementById('grid');grid.innerHTML='';
  SECTIONS.forEach(s=>{
    const raw=P.data[s.key];const items=Array.isArray(raw)?raw:raw.items;const total=Array.isArray(raw)?raw.length:raw.total;
    const card=document.createElement('div');card.className='sec';if(pKey!=='semana')card.classList.add('closed');
    let rows=items.length?items.map(it=>'<div class="r"><div class="who"><span class="nm">'+it.nm+'</span><span class="co">'+it.co+'</span></div><span class="meta">'+it.d+'</span></div>').join(''):'<div class="empty">Ninguém no período</div>';
    let more=total>items.length?'<div class="more">+'+(total-items.length)+' mais</div>':'';
    card.innerHTML='<h3><span class="ttl">'+s.t+'</span><span class="hr"><span class="c">'+total+'</span><span class="tg">▾</span></span></h3><div class="rows">'+rows+more+'</div>';
    grid.appendChild(card);
  });
}
document.getElementById('period').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;[...e.currentTarget.children].forEach(x=>x.classList.remove('on'));b.classList.add('on');render(b.dataset.p);});
document.getElementById('theme').addEventListener('click',e=>{const dk=document.body.classList.toggle('dark');document.body.classList.toggle('light',!dk);e.target.firstChild.textContent=dk?'Escuro':'Claro';});
document.getElementById('pdf').addEventListener('click',()=>alert('No app, este botão gera o PDF no estilo do relatório antigo, com estes dados.'));
document.getElementById('grid').addEventListener('click',e=>{const h=e.target.closest('h3');if(!h)return;h.parentElement.classList.toggle('closed');});
render('semana');
</script>
</body>
</html>
